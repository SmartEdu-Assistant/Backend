openapi: 3.0.3

info:
  title: SmartEdu Assistant API
  description: API for digital assistant for teachers to manage courses, assignments, submissions, plagiarism checks, comments and grades.
  version: 1.0.0

servers:
  - url: /api/v1

tags:
  - name: Auth
  - name: Teachers
  - name: Courses
  - name: Groups
  - name: Students
  - name: Assignments
  - name: Submissions
  - name: Comments
  - name: Grades
  - name: Reports
  - name: Admin

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Регистрация пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: User with this email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Вход в систему
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /teachers:
    get:
      tags: [Teachers]
      summary: Получить список преподавателей
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - in: query
          name: status
          schema:
            type: string
            enum: [ACTIVE, BLOCKED]
        - in: query
          name: search
          schema:
            type: string
          description: Поиск по имени, фамилии или электронной почте
      responses:
        '200':
          description: Список преподавателей
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Teachers]
      summary: Создать преподавателя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeacherCreateRequest'
      responses:
        '201':
          description: Преподаватель создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /teachers/{teacherId}:
    get:
      tags: [Teachers]
      summary: Получить преподавателя по ID
      parameters:
        - $ref: '#/components/parameters/TeacherIdParam'
      responses:
        '200':
          description: Данные преподавателя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Teachers]
      summary: Обновить преподавателя
      parameters:
        - $ref: '#/components/parameters/TeacherIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeacherUpdateRequest'
      responses:
        '200':
          description: Преподаватель обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Teachers]
      summary: Заблокировать преподавателя
      parameters:
        - $ref: '#/components/parameters/TeacherIdParam'
      responses:
        '204':
          description: Преподаватель заблокирован
        '404':
          $ref: '#/components/responses/NotFound'

  /courses:
    get:
      tags: [Courses]
      summary: Получить список курсов
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - in: query
          name: teacher_id
          schema:
            type: integer
            format: int64
        - in: query
          name: is_active
          schema:
            type: boolean
        - in: query
          name: search
          schema:
            type: string
      responses:
        '200':
          description: Список курсов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseListResponse'

    post:
      tags: [Courses]
      summary: Создать курс
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseCreateRequest'
      responses:
        '201':
          description: Курс создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /courses/{courseId}:
    get:
      tags: [Courses]
      summary: Получить курс по ID
      parameters:
        - $ref: '#/components/parameters/CourseIdParam'
      responses:
        '200':
          description: Данные курса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Courses]
      summary: Обновить курс
      parameters:
        - $ref: '#/components/parameters/CourseIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseUpdateRequest'
      responses:
        '200':
          description: Курс обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Courses]
      summary: Деактивировать курс
      parameters:
        - $ref: '#/components/parameters/CourseIdParam'
      responses:
        '204':
          description: Курс деактивирован
        '404':
          $ref: '#/components/responses/NotFound'

  /groups:
    get:
      tags: [Groups]
      summary: Получить список групп
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - in: query
          name: course_id
          schema:
            type: integer
            format: int64
        - in: query
          name: year
          schema:
            type: integer
        - in: query
          name: semester
          schema:
            type: string
      responses:
        '200':
          description: Groups list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupListResponse'

    post:
      tags: [Groups]
      summary: Создать группу
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupCreateRequest'
      responses:
        '201':
          description: Группа создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'

  /groups/{groupId}:
    get:
      tags: [Groups]
      summary: Получить группу по ID
      parameters:
        - $ref: '#/components/parameters/GroupIdParam'
      responses:
        '200':
          description: Данные группы
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Groups]
      summary: Обновить группу
      parameters:
        - $ref: '#/components/parameters/GroupIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupUpdateRequest'
      responses:
        '200':
          description: Группа обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'

    delete:
      tags: [Groups]
      summary: Удалить группу
      parameters:
        - $ref: '#/components/parameters/GroupIdParam'
      responses:
        '204':
          description: Группа удалена

  /students:
    get:
      tags: [Students]
      summary: Получить список студентов
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - in: query
          name: group_id
          schema:
            type: integer
            format: int64
        - in: query
          name: search
          schema:
            type: string
      responses:
        '200':
          description: Список студентов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentListResponse'

    post:
      tags: [Students]
      summary: Создать студента
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentCreateRequest'
      responses:
        '201':
          description: Студент создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponse'

  /students/{studentId}:
    get:
      tags: [Students]
      summary: Получить студента по ID
      parameters:
        - $ref: '#/components/parameters/StudentIdParam'
      responses:
        '200':
          description: Данные студента
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Students]
      summary: Обновить студента
      parameters:
        - $ref: '#/components/parameters/StudentIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentUpdateRequest'
      responses:
        '200':
          description: Студент обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponse'

    delete:
      tags: [Students]
      summary: Удалить студента
      parameters:
        - $ref: '#/components/parameters/StudentIdParam'
      responses:
        '204':
          description: Студент удален

  /assignments:
    get:
      tags: [Assignments]
      summary: Получить список заданий
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - in: query
          name: course_id
          schema:
            type: integer
            format: int64
        - in: query
          name: language
          schema:
            type: string
        - in: query
          name: deadline_from
          schema:
            type: string
            format: date-time
        - in: query
          name: deadline_to
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Список заданий
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentListResponse'

    post:
      tags: [Assignments]
      summary: Создать задание
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentCreateRequest'
      responses:
        '201':
          description: Задание создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentResponse'

  /assignments/{assignmentId}:
    get:
      tags: [Assignments]
      summary: Получить задание по ID
      parameters:
        - $ref: '#/components/parameters/AssignmentIdParam'
      responses:
        '200':
          description: Данные задания
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Assignments]
      summary: Обновить задание
      parameters:
        - $ref: '#/components/parameters/AssignmentIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentUpdateRequest'
      responses:
        '200':
          description: Задание обновлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentResponse'

    delete:
      tags: [Assignments]
      summary: Удалить задание
      parameters:
        - $ref: '#/components/parameters/AssignmentIdParam'
      responses:
        '204':
          description: Задание удалено

  /submissions:
    get:
      tags: [Submissions]
      summary: Получить список отправок
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - in: query
          name: assignment_id
          schema:
            type: integer
            format: int64
        - in: query
          name: student_id
          schema:
            type: integer
            format: int64
        - in: query
          name: status
          schema:
            type: string
            enum: [UPLOADED, CHECKING, DONE, ERROR]
      responses:
        '200':
          description: Список отправок
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionListResponse'

    post:
      tags: [Submissions]
      summary: Создать отправку
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmissionCreateRequest'
      responses:
        '201':
          description: Отправка создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /submissions/{submissionId}:
    get:
      tags: [Submissions]
      summary: Получить отправку по ID
      parameters:
        - $ref: '#/components/parameters/SubmissionIdParam'
      responses:
        '200':
          description: Данные отправки
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionDetailsResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /submissions/{submissionId}/check:
    post:
      tags: [Submissions]
      summary: Запустить проверку отправки
      parameters:
        - $ref: '#/components/parameters/SubmissionIdParam'
      responses:
        '202':
          description: Проверка отправки начата
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncTaskResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /submissions/{submissionId}/comments:
    get:
      tags: [Comments]
      summary: Получить комментарии к отправке
      parameters:
        - $ref: '#/components/parameters/SubmissionIdParam'
      responses:
        '200':
          description: Список комментариев
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentListResponse'

    post:
      tags: [Comments]
      summary: Добавить комментарий к отправке
      parameters:
        - $ref: '#/components/parameters/SubmissionIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentCreateRequest'
      responses:
        '201':
          description: Комментарий создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentResponse'

  /submissions/{submissionId}/grade:
    put:
      tags: [Grades]
      summary: Установить или обновить оценку для отправки
      parameters:
        - $ref: '#/components/parameters/SubmissionIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GradeUpsertRequest'
      responses:
        '200':
          description: Оценка сохранена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GradeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /assignments/{assignmentId}/journal:
    get:
      tags: [Grades]
      summary: Получить журнал оценок для задания
      parameters:
        - $ref: '#/components/parameters/AssignmentIdParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - in: query
          name: status
          schema:
            type: string
            enum: [UPLOADED, CHECKING, DONE, ERROR]
      responses:
        '200':
          description: Журнал оценок
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalResponse'

  /submissions/{submissionId}/plagiarism:
    get:
      tags: [Reports]
      summary: Получить отчет о плагиате для отправки
      parameters:
        - $ref: '#/components/parameters/SubmissionIdParam'
      responses:
        '200':
          description: Отчет о плагиате
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlagiarismReportResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /submissions/{submissionId}/test-results:
    get:
      tags: [Reports]
      summary: Получить результаты тестов для отправки
      parameters:
        - $ref: '#/components/parameters/SubmissionIdParam'
      responses:
        '200':
          description: Результаты тестов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestResultListResponse'

  /admin/statistics:
    get:
      tags: [Admin]
      summary: Получить системную статистику
      responses:
        '200':
          description: Системная статистика
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStatisticsResponse'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  parameters:
    PageParam:
      in: query
      name: page
      schema:
        type: integer
        default: 1
        minimum: 1
      description: Page number

    SizeParam:
      in: query
      name: size
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      description: Page size

    TeacherIdParam:
      in: path
      name: teacherId
      required: true
      schema:
        type: integer
        format: int64

    CourseIdParam:
      in: path
      name: courseId
      required: true
      schema:
        type: integer
        format: int64

    GroupIdParam:
      in: path
      name: groupId
      required: true
      schema:
        type: integer
        format: int64

    StudentIdParam:
      in: path
      name: studentId
      required: true
      schema:
        type: integer
        format: int64

    AssignmentIdParam:
      in: path
      name: assignmentId
      required: true
      schema:
        type: integer
        format: int64

    SubmissionIdParam:
      in: path
      name: submissionId
      required: true
      schema:
        type: integer
        format: int64

  responses:
    BadRequest:
      description: Invalid request data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: Требуется аутентификация или недействительный токен
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: Недостаточно прав
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: NOT_FOUND
            message:
              type: string
              example: Resource not found
            details:
              type: array
              items:
                type: string
              example: ["Course with id=10 does not exist"]
      required: [error]

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        first_name:
          type: string
        last_name:
          type: string
        role:
          type: string
          enum: [ADMIN, TEACHER]
      required: [email, password, first_name, last_name, role]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: bearer
        user:
          $ref: '#/components/schemas/UserResponse'
      required: [access_token, token_type, user]

    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        role:
          type: string
          enum: [ADMIN, TEACHER]
        status:
          type: string
          enum: [ACTIVE, BLOCKED]
        created_at:
          type: string
          format: date-time
      required: [id, email, first_name, last_name, role, status, created_at]

    TeacherCreateRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
      required: [email, first_name, last_name]

    TeacherUpdateRequest:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        status:
          type: string
          enum: [ACTIVE, BLOCKED]

    CourseCreateRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        teacher_id:
          type: integer
          format: int64
        is_active:
          type: boolean
      required: [title, teacher_id, is_active]

    CourseUpdateRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        is_active:
          type: boolean

    CourseResponse:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        teacher_id:
          type: integer
        created_at:
          type: string
          format: date-time
        is_active:
          type: boolean
      required: [id, title, teacher_id, created_at, is_active]

    GroupCreateRequest:
      type: object
      properties:
        name:
          type: string
        semester:
          type: string
        year:
          type: integer
        course_id:
          type: integer
      required: [name, semester, year, course_id]

    GroupUpdateRequest:
      type: object
      properties:
        name:
          type: string
        semester:
          type: string
        year:
          type: integer

    GroupResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        semester:
          type: string
        year:
          type: integer
        course_id:
          type: integer
        created_at:
          type: string
          format: date-time
      required: [id, name, semester, year, course_id, created_at]

    StudentCreateRequest:
      type: object
      properties:
        full_name:
          type: string
        email:
          type: string
          format: email
          nullable: true
        group_id:
          type: integer
      required: [full_name, group_id]

    StudentUpdateRequest:
      type: object
      properties:
        full_name:
          type: string
        email:
          type: string
          format: email
          nullable: true
        group_id:
          type: integer

    StudentResponse:
      type: object
      properties:
        id:
          type: integer
        full_name:
          type: string
        email:
          type: string
          nullable: true
        group_id:
          type: integer
        created_at:
          type: string
