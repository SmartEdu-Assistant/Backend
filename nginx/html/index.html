<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmartEdu Assistant</title>
    <style>
        :root {
            color-scheme: light;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #f5f7fa, #dfe7f1);
            color: #102033;
        }

        main {
            max-width: 560px;
            padding: 32px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 24px 48px rgba(16, 32, 51, 0.12);
        }

        h1 {
            margin-top: 0;
        }

        code {
            padding: 2px 6px;
            border-radius: 6px;
            background: #eef3f8;
        }
    </style>
</head>
<body>
    <main>
        <h1>SmartEdu Assistant</h1>
        <p>Reverse proxy запущен и отдает frontend-заглушку.</p>
        <p>API доступно через префикс <code>/api</code>, например <code>/api/v1/docs</code>.</p>
    </main>
</body>
</html>
