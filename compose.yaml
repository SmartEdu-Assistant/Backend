name: smartedu-assistant

x-back-image: &back-image ${BACKEND_IMAGE:-docker.io/your-dockerhub-user/smartedu-assistant-backend:latest}

x-back-service: &back-service
  image: *back-image
  env_file:
    - .env
  environment: &back-environment
    DB__HOST: db
  networks:
    - smartedu

services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: ${DB__NAME}
      POSTGRES_USER: ${DB__USER}
      POSTGRES_PASSWORD: ${DB__PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - smartedu

  migrations:
    <<: *back-service
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  rbac:
    <<: *back-service
    command: ["python", "scripts/bootstrap_rbac.py"]
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    restart: on-failure

  api:
    <<: *back-service
    command: ["gunicorn", "app.main:app", "-c", "gunicorn.conf.py"]
    environment:
      <<: *back-environment
      RBAC__BOOTSTRAP_ON_STARTUP: "false"
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      rbac:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/var/www/html:ro
    restart: unless-stopped
    networks:
      - smartedu

volumes:
  postgres_data:

networks:
  smartedu:
