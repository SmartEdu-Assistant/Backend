name: smartedu-assistant

x-back-image: &back-image docker.io/konstantinks7/smart_edu_assistant@sha256:152210c885ed9a8702ea42e0293adc3a4097301331fdf37838be61fe409f97a0

x-back-service: &back-service
  image: *back-image
  env_file:
    - .env
  environment: &back-environment
    DB__HOST: db

services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: ${DB__NAME}
      POSTGRES_USER: ${DB__USER}
      POSTGRES_PASSWORD: ${DB__PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  migrations:
    <<: *back-service
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  rbac:
    <<: *back-service
    command: ["python", "scripts/bootstrap_rbac.py"]
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    restart: on-failure

  api:
    <<: *back-service
    command: ["gunicorn", "app.main:app", "-c", "gunicorn.conf.py"]
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      rbac:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine3.23-slim
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/var/www/html:ro
    restart: unless-stopped

volumes:
  postgres_data:
